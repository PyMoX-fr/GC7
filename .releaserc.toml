[semantic_release]
version_source = "tag"
version_variable = "src/pymox_tools/__init__.py:__version__"
tag_format = "v{version}"
build_command = "python -m build"

upload_to_pypi = true
upload_sdist = true
upload_wheel = true

hvcs = "github"
github_token = "env:GH_TOKEN"
pypi_token = "env:PYPI_TOKEN"

branch = "main"
log_level = "DEBUG"
verify_release_commit = true
